server:
  port: 8080

spring:
  application:
    name: task-manager-api

  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    # For local development only. Override with the APP_JWT_SECRET env var in real deployments.
    secret: ${APP_JWT_SECRET:local-dev-secret-key-change-me-please-32bytes-min}
    expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.example.taskmanager: INFO
